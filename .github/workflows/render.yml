name: Render video

on:
  repository_dispatch:
    types: [render_video]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar ffmpeg y Pillow
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu
          pip install edge-tts Pillow requests

      - name: Separar título e historia
        id: split
        run: |
          python3 -c "
          raw = '''${{ github.event.client_payload.text }}'''
          title, story = raw.split('|||', 1)
          with open('title.txt', 'w') as f: f.write(title.strip())
          with open('story.txt', 'w') as f: f.write(story.strip())
          "

      - name: Generar audio narrado (gratis, sin key)
        run: |
          edge-tts --voice es-MX-DaliaNeural --file story.txt --write-media audio.mp3

      - name: Descargar imagen de fondo (Pollinations, gratis)
        run: |
          curl -L "${{ github.event.client_payload.image_url }}" -o image.jpg

      - name: Crear miniatura con el título superpuesto
        run: |
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import textwrap

          img = Image.open("image.jpg").convert("RGB")
          draw = ImageDraw.Draw(img)

          with open("title.txt") as f:
              title = f.read().strip()

          font_size = int(img.width / 10)
          try:
              font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", font_size)
          except:
              font = ImageFont.load_default()

          wrapped = textwrap.fill(title, width=14)
          bbox = draw.multiline_textbbox((0, 0), wrapped, font=font, align="center")
          text_w = bbox[2] - bbox[0]
          text_h = bbox[3] - bbox[1]
          x = (img.width - text_w) / 2
          y = img.height * 0.68

          # Contorno negro para que se lea sobre cualquier fondo
          for dx in range(-4, 5, 2):
              for dy in range(-4, 5, 2):
                  draw.multiline_text((x+dx, y+dy), wrapped, font=font, fill="black", align="center")
          draw.multiline_text((x, y), wrapped, font=font, fill="white", align="center")

          img.save("thumbnail.jpg", quality=92)
          PYEOF

      - name: Armar video con FFmpeg (formato vertical, efecto zoom)
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.mp3)
          FRAMES=$(python3 -c "print(int(float('$DURATION')*25))")
          ffmpeg -y -loop 1 -i image.jpg -i audio.mp3 \
            -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,zoompan=z='min(zoom+0.0015,1.3)':d=${FRAMES}:s=1080x1920:fps=25[v]" \
            -map "[v]" -map 1:a -c:v libx264 -c:a aac -shortest -t "$DURATION" video.mp4

      - name: Publicar el video y la miniatura como Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_id }}
          files: |
            video.mp4
            thumbnail.jpg

      - name: Avisar a Make que el video ya está listo
        run: |
          curl -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"video_url\": \"https://github.com/${{ github.repository }}/releases/download/video-${{ github.run_id }}/video.mp4\", \"thumbnail_url\": \"https://github.com/${{ github.repository }}/releases/download/video-${{ github.run_id }}/thumbnail.jpg\"}"
